<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>PsychML</title>
</head>
<body>
    <div class="container">
        <h1> Emotion Analyser </h1>

        <form method="post">
            <textarea 
                name="user_input" 
                placeholder="Enter text to analyze emotion..."
                required>{{ text }}</textarea>
                <button type="submit">Analyze</button>
        </form>
        {% if emotion %}
        <div class="results">
            <h2>Detected Emotion: {{ emotion }}</h2>
        </div>
        {% endif %}
    </div>
</body>
</html>
